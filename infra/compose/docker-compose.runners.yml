services:
  transcode_runner_amd:
    image: ${REGISTRY:-tztcloud}/transcode-runner-amd:${TAG:-v1.3.0}
    profiles: ["amd"]
    devices:
      - /dev/dri:/dev/dri
    environment:
      - RUNNER_ADDR=:8080
      - MAX_QUEUE_SIZE=5
      - TEMP_DIR=/tmp/transcode
      - JOB_TTL_SECONDS=3600
      - PRESETS_FILE=/etc/runner/presets/transcode.yaml
    volumes:
      - ../presets:/etc/runner/presets:ro
      - transcode-temp:/tmp/transcode
    ports:
      - "${TRANSCODE_RUNNER_PORT:-8086}:8080"

  abr_runner_amd:
    image: ${REGISTRY:-tztcloud}/abr-runner-amd:${TAG:-v1.3.0}
    profiles: ["amd"]
    devices:
      - /dev/dri:/dev/dri
    environment:
      - RUNNER_ADDR=:8080
      - MAX_QUEUE_SIZE=2
      - TEMP_DIR=/tmp/abr
      - JOB_TTL_SECONDS=3600
      - PRESETS_FILE=/etc/runner/presets/abr.yaml
    volumes:
      - ../presets:/etc/runner/presets:ro
      - abr-temp:/tmp/abr
    ports:
      - "${ABR_RUNNER_PORT:-8087}:8080"

  live_runner_amd:
    image: ${REGISTRY:-tztcloud}/live-runner-amd:${TAG:-v1.3.0}
    profiles: ["amd"]
    devices:
      - /dev/dri:/dev/dri
    environment:
      - RUNNER_ADDR=:8080
      - PUBLIC_HOST=localhost:${LIVE_RUNNER_PORT:-8088}
      - TEMP_DIR=/tmp/live
      - PRESETS_FILE=/etc/runner/presets/live.yaml
      - RTMP_PUBLIC_HOST=localhost
      - RTMP_LISTEN_HOST=0.0.0.0
      - RTMP_PORT_START=${LIVE_RTMP_PORT_START:-19350}
      - RTMP_PORT_END=${LIVE_RTMP_PORT_END:-19449}
    volumes:
      - ../presets:/etc/runner/presets:ro
      - live-temp:/tmp/live
    ports:
      - "${LIVE_RUNNER_PORT:-8088}:8080"
      - "${LIVE_RTMP_PORT_START:-19350}-${LIVE_RTMP_PORT_END:-19449}:${LIVE_RTMP_PORT_START:-19350}-${LIVE_RTMP_PORT_END:-19449}"

  transcode_runner_intel:
    image: ${REGISTRY:-tztcloud}/transcode-runner-intel:${TAG:-v1.3.0}
    profiles: ["intel"]
    devices:
      - /dev/dri:/dev/dri
    environment:
      - RUNNER_ADDR=:8080
      - MAX_QUEUE_SIZE=5
      - TEMP_DIR=/tmp/transcode
      - JOB_TTL_SECONDS=3600
      - PRESETS_FILE=/etc/runner/presets/transcode.yaml
    volumes:
      - ../presets:/etc/runner/presets:ro
      - transcode-temp:/tmp/transcode
    ports:
      - "${TRANSCODE_RUNNER_PORT:-8086}:8080"

  abr_runner_intel:
    image: ${REGISTRY:-tztcloud}/abr-runner-intel:${TAG:-v1.3.0}
    profiles: ["intel"]
    devices:
      - /dev/dri:/dev/dri
    environment:
      - RUNNER_ADDR=:8080
      - MAX_QUEUE_SIZE=2
      - TEMP_DIR=/tmp/abr
      - JOB_TTL_SECONDS=3600
      - PRESETS_FILE=/etc/runner/presets/abr.yaml
    volumes:
      - ../presets:/etc/runner/presets:ro
      - abr-temp:/tmp/abr
    ports:
      - "${ABR_RUNNER_PORT:-8087}:8080"

  live_runner_intel:
    image: ${REGISTRY:-tztcloud}/live-runner-intel:${TAG:-v1.3.0}
    profiles: ["intel"]
    devices:
      - /dev/dri:/dev/dri
    environment:
      - RUNNER_ADDR=:8080
      - PUBLIC_HOST=localhost:${LIVE_RUNNER_PORT:-8088}
      - TEMP_DIR=/tmp/live
      - PRESETS_FILE=/etc/runner/presets/live.yaml
      - RTMP_PUBLIC_HOST=localhost
      - RTMP_LISTEN_HOST=0.0.0.0
      - RTMP_PORT_START=${LIVE_RTMP_PORT_START:-19350}
      - RTMP_PORT_END=${LIVE_RTMP_PORT_END:-19449}
    volumes:
      - ../presets:/etc/runner/presets:ro
      - live-temp:/tmp/live
    ports:
      - "${LIVE_RUNNER_PORT:-8088}:8080"
      - "${LIVE_RTMP_PORT_START:-19350}-${LIVE_RTMP_PORT_END:-19449}:${LIVE_RTMP_PORT_START:-19350}-${LIVE_RTMP_PORT_END:-19449}"

  transcode_runner_nvidia:
    image: ${REGISTRY:-tztcloud}/transcode-runner-nvidia:${TAG:-v1.3.0}
    profiles: ["nvidia"]
    runtime: nvidia
    environment:
      - RUNNER_ADDR=:8080
      - MAX_QUEUE_SIZE=5
      - TEMP_DIR=/tmp/transcode
      - JOB_TTL_SECONDS=3600
      - PRESETS_FILE=/etc/runner/presets/transcode.yaml
    volumes:
      - ../presets:/etc/runner/presets:ro
      - transcode-temp:/tmp/transcode
    ports:
      - "${TRANSCODE_RUNNER_PORT:-8086}:8080"

  abr_runner_nvidia:
    image: ${REGISTRY:-tztcloud}/abr-runner-nvidia:${TAG:-v1.3.0}
    profiles: ["nvidia"]
    runtime: nvidia
    environment:
      - RUNNER_ADDR=:8080
      - MAX_QUEUE_SIZE=2
      - TEMP_DIR=/tmp/abr
      - JOB_TTL_SECONDS=3600
      - PRESETS_FILE=/etc/runner/presets/abr.yaml
    volumes:
      - ../presets:/etc/runner/presets:ro
      - abr-temp:/tmp/abr
    ports:
      - "${ABR_RUNNER_PORT:-8087}:8080"

  live_runner_nvidia:
    image: ${REGISTRY:-tztcloud}/live-runner-nvidia:${TAG:-v1.3.0}
    profiles: ["nvidia"]
    runtime: nvidia
    environment:
      - RUNNER_ADDR=:8080
      - PUBLIC_HOST=localhost:${LIVE_RUNNER_PORT:-8088}
      - TEMP_DIR=/tmp/live
      - PRESETS_FILE=/etc/runner/presets/live.yaml
      - RTMP_PUBLIC_HOST=localhost
      - RTMP_LISTEN_HOST=0.0.0.0
      - RTMP_PORT_START=${LIVE_RTMP_PORT_START:-19350}
      - RTMP_PORT_END=${LIVE_RTMP_PORT_END:-19449}
    volumes:
      - ../presets:/etc/runner/presets:ro
      - live-temp:/tmp/live
    ports:
      - "${LIVE_RUNNER_PORT:-8088}:8080"
      - "${LIVE_RTMP_PORT_START:-19350}-${LIVE_RTMP_PORT_END:-19449}:${LIVE_RTMP_PORT_START:-19350}-${LIVE_RTMP_PORT_END:-19449}"

volumes:
  transcode-temp: {}
  abr-temp: {}
  live-temp: {}
